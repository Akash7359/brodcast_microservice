<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; }
    .container { max-width: 520px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 8px; }
    .btn { display: inline-block; padding: 12px 28px; background: #2563eb; color: #fff; border-radius: 6px; text-decoration: none; font-weight: bold; }
    .footer { font-size: 12px; color: #888; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Your Password</h2>
    <p>Hello {{ name | default("User") }},</p>
    <p>We received a request to reset your password. Click the button below:</p>
    <p><a href="{{ reset_link }}" class="btn">Reset Password</a></p>
    <p>This link expires in <strong>30 minutes</strong>. If you didn't request this, ignore this email.</p>
    <div class="footer">
      &copy; {{ year | default("2025") }} Your Company. All rights reserved.
    </div>
  </div>
</body>
</html>
